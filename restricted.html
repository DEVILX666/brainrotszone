<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Restricted</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #09090b;
      color: #ffffff;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    .blob {
      pointer-events: none;
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }
    .blob-left  { width: 288px; height: 288px; background: rgba(217,70,219,0.18); top: -80px; left: -96px; }
    .blob-right { width: 288px; height: 288px; background: rgba(6,182,212,0.18); bottom: -80px; right: -96px; }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 20px;
      padding: 2.2rem 2rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }

    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: 14px;
      background: rgba(239,68,68,0.2);
      font-size: 1.35rem;
      font-weight: 700;
      color: #f87171;
      margin-bottom: 1.3rem;
      border: 1px solid rgba(239,68,68,0.25);
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    .message {
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.88);
    }

    .helper {
      margin-top: 0.85rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: #6ee7b7;
      text-shadow: 0 0 14px rgba(16,185,129,0.6);
    }

    .divider {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .note {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
    }
    .continue-anyway {
      display: none;
      margin-top: 1.15rem;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      background: linear-gradient(90deg, #22c55e 0%, #16e085 100%);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25), 0 8px 22px rgba(34, 197, 94, 0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .continue-anyway:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3), 0 10px 26px rgba(34, 197, 94, 0.65);
    }
    .continue-anyway:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="blob blob-left"></div>
  <div class="blob blob-right"></div>

  <section class="card">
    <div class="icon-wrap">!</div>
    <h1>Access Restricted</h1>
    <p class="message" id="mainMessage">This website is not available on your current device.</p>
    <p class="helper" id="helperText">Please switch devices to continue.</p>
    <hr class="divider">
    <p class="note" id="noteText">Your access is restricted based on your device and region.</p>
    <button id="continueBtn" class="continue-anyway" type="button">Continue Anyway</button>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');

    const mainMessage = document.getElementById('mainMessage');
    const helperText  = document.getElementById('helperText');
    const noteText    = document.getElementById('noteText');
    const continueBtn = document.getElementById('continueBtn');

    if (reason === 'phone_only') {
      mainMessage.textContent = 'This website is only available on phone.';
      helperText.textContent  = 'Switch to a phone to continue.';
      noteText.textContent    = 'Desktop and tablet access is not supported at this time.';
    } else if (reason === 'ios_us_warning') {
      mainMessage.textContent = 'This website works much better on Android Phones.';
      helperText.textContent  = 'On iPhone/iOS, There is a high chance you will not receive your brainrot.';
      noteText.textContent = 'For the best experience, please switch to Android. If you don\'t have an Android phone, you can still continue below.';
      continueBtn.style.display = 'block';
      continueBtn.addEventListener('click', function () {
        try { sessionStorage.setItem('ios_us_warning_continue', '1'); } catch (e) {}
        window.location.replace('index.html');
      });
    } else {
      // Default: ios_only
      mainMessage.textContent = 'This website is only available on iPhone (iOS) devices.';
      helperText.textContent  = 'Switch to an iPhone to continue.';
      noteText.textContent    = 'Android devices access is not supported at this time.';
    }
  </script>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WK4353NSMZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-WK4353NSMZ');
</script>
</body>
</html>
